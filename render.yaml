services:
  - type: web
    name: telegram-audio-api
    runtime: python
    plan: free

    pythonVersion: 3.10   # ✅ THIS IS THE REAL FIX

    buildCommand: pip install -r requirements.txt
    startCommand: python AdityaHalder.py

    envVars:
      - key: API_ID
        sync: false
      - key: API_HASH
        sync: false
      - key: BOT_TOKEN
        sync: false
      - key: MONGO_URL
        sync: false
      - key: CHANNEL_ID
        sync: false
      - key: SUDO_USERS
        sync: false
